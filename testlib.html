<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FEZAcademy — Библиотека НРТК</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #07000d; --pm: #3d0070; --pg: #8b2fc9; --pb: #c678f5; --pu: #e0a8ff;
            --acc: #bf5af2; --tp: #f0e4ff; --tm: #a07ec0;
            --glass: rgba(26, 4, 50, 0.65); --border: rgba(140, 50, 200, 0.28);
            --ibg: rgba(255, 255, 255, 0.043); --ibr: rgba(180, 100, 255, 0.18);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--tp); min-height: 100vh; display: flex; flex-direction: column; }
        body::after {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 50% 65% at 50% -20%, rgba(100, 20, 180, .25) 0%, rgba(40, 5, 80, .10) 52%, transparent 75%);
            pointer-events: none; z-index: -1;
        }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(10, 0, 20, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--pm), var(--pg)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(125, 38, 196, .5); }
        .brand-icon svg { width: 18px; height: 18px; fill: #fff; }
        .brand-name { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; background: linear-gradient(130deg, var(--pu), var(--pb) 55%, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-bar { flex: 1; max-width: 400px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px 10px 40px; background: var(--ibg); border: 1px solid var(--ibr); border-radius: 12px; color: var(--tp); outline: none; transition: border-color .3s; }
        .search-bar input:focus { border-color: var(--acc); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--tm); width: 16px; height: 16px; }
        .user-profile { font-size: 0.9rem; color: var(--tm); }
        .container { display: flex; flex: 1; padding: 30px 40px; gap: 40px; }
        aside { width: 220px; flex-shrink: 0; }
        .filter-title { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--tp); margin-bottom: 15px; border-bottom: 2px solid var(--pm); padding-bottom: 8px; }
        .filter-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .filter-list li { padding: 8px 12px; border-radius: 8px; cursor: pointer; color: var(--tm); font-size: 0.9rem; transition: all .2s; }
        .filter-list li:hover { background: var(--ibg); color: var(--pu); }
        .filter-list li.active { background: linear-gradient(135deg, rgba(61,0,112,0.4), rgba(139,47,201,0.4)); color: #fff; border: 1px solid var(--border); }
        main { flex: 1; }
        .content-header { margin-bottom: 25px; }
        .content-title { font-family: 'Syne', sans-serif; font-size: 1.8rem; margin-bottom: 5px; }
        .content-sub { color: var(--tm); font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .doc-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; overflow: hidden; }
        .doc-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(85, 13, 165, .3); border-color: rgba(170, 65, 255, .5); }
        .doc-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(140, 47, 201, .15); display: flex; align-items: center; justify-content: center; color: var(--acc); margin-bottom: 5px; }
        .doc-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
        .doc-author { font-size: 0.8rem; color: var(--tm); }
        .doc-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--pu); border: 1px solid rgba(224, 168, 255, 0.2); }
        .btn-download { margin-top: auto; padding: 10px; width: 100%; background: linear-gradient(135deg, var(--pm), var(--pg)); color: #fff; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; transition: box-shadow 0.2s, transform 0.1s; }
        .btn-download:hover { box-shadow: 0 4px 15px rgba(85, 13, 165, .4); }
        .btn-download:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 3L1 9l4 2.18V15c0 2.67 4.67 5 7 5s7-2.33 7-5v-3.82L22 9l-10-6zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 14.99c0 .72-2.13 2.01-5 2.01s-5-1.29-5-2V11.4l5 2.72 5-2.72v3.59z"/></svg>
            </div>
            <div class="brand-name">Библиотека НРТК</div>
        </div>
        <div class="search-bar">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Поиск по предмету или автору..." id="searchInput">
        </div>
        <div class="user-profile" id="user-display">
            </div>
    </header>

    <div class="container">
        <aside>
            <h3 class="filter-title">Группы</h3>
            <ul class="filter-list" id="groupFilter">
                <li class="active" data-group="all">Все методички</li>
                <li data-group="isip">ИСиП (Инф. системы)</li>
                <li data-group="mrep">МРЭП (Прог. инженерия)</li>
                <li data-group="reus">РЭУС (Комп. сети)</li>
                <li data-group="ibas">ИБАС (Комп. сети)</li>
            </ul>
        </aside>

        <main>
            <div id="adminPanel" style="display: none; background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(170, 65, 255, .5); border-radius: 16px; padding: 20px; margin-bottom: 25px;">
    <h3 style="margin-bottom: 15px; font-family: 'Syne', sans-serif; color: var(--pu);">Добавить новую методичку (Панель преподавателя)</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
        <input type="text" id="newTitle" placeholder="Название (напр. Основы БД)" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--ibr); background: var(--ibg); color: var(--tp);">
        <input type="text" id="newAuthor" placeholder="Автор (напр. Преп: Смирнов А.В.)" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--ibr); background: var(--ibg); color: var(--tp);">
        <input type="text" id="newLink" placeholder="Ссылка на файл (Я.Диск, Google Drive)" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--ibr); background: var(--ibg); color: var(--tp);">
    </div>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
        <input type="text" id="newGroups" placeholder="Теги для фильтра (напр. is-22, ks-23)" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--ibr); background: var(--ibg); color: var(--tp);">
        <input type="text" id="newTags" placeholder="Отображаемые теги (напр. ИС-22, C++)" style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--ibr); background: var(--ibg); color: var(--tp);">
        <input type="text" id="newType" placeholder="Формат (PDF, DOCX)" style="width: 150px; padding: 10px; border-radius: 8px; border: 1px solid var(--ibr); background: var(--ibg); color: var(--tp);">
    </div>
    <button id="js-add-book" style="padding: 10px 20px; background: linear-gradient(135deg, var(--pm), var(--pg)); color: #fff; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; cursor: pointer;">Опубликовать</button>
</div>
            <div class="content-header">
                <h1 class="content-title">Учебные материалы</h1>
                <p class="content-sub">Выберите нужную методичку для скачивания или просмотра онлайн.</p>
            </div>

            <div class="grid" id="docsGrid"></div>
        </main>
    </div>

    <script>
       // 1. Проверяем авторизацию и выводим имя + роль
const savedUser = JSON.parse(localStorage.getItem('nrtk_user'));
const userDisplay = document.getElementById('user-display');
const adminPanel = document.getElementById('adminPanel');

if (!savedUser) {
    window.location.href = 'index.html';
} else {
    // Если преподаватель - показываем админку
    if (savedUser.role === 'teacher') {
        userDisplay.innerHTML = `Преподаватель: ${savedUser.name} | <a href="index.html" onclick="localStorage.removeItem('nrtk_user')" style="color: var(--pb); text-decoration: none;">Выйти</a>`;
        adminPanel.style.display = 'block';
    } else {
        userDisplay.innerHTML = `Студент: ${savedUser.name} | <a href="index.html" onclick="localStorage.removeItem('nrtk_user')" style="color: var(--pb); text-decoration: none;">Выйти</a>`;
    }
}

// 2. БАЗА ДАННЫХ (теперь используем localStorage, чтобы новые записи сохранялись)
const defaultDatabase = [
    {
        title: "Основы алгоритмизации и программирования",
        author: "Преп: Смирнов А.В. • Практика №1-5",
        groups: ["is-22", "pi-21"], 
        tags: ["ИС-22", "ПИ-21", "C++"],
        type: "PDF",
        link: "https://ya.ru" // Замени на нужные ссылки
    },
    {
        title: "Архитектура аппаратных средств",
        author: "Преп: Иванов В.И. • Лабораторные",
        groups: ["ks-23"],
        tags: ["КС-23", "Железо"],
        type: "DOCX",
        link: "https://ya.ru"
    }
];

// Пытаемся взять книги из памяти. Если их там нет — берем дефолтные
let libraryDatabase = JSON.parse(localStorage.getItem('nrtk_books')) || defaultDatabase;

// 3. Функция отрисовки карточек
const grid = document.getElementById('docsGrid');

function renderBooks(books) {
    grid.innerHTML = ''; 
    books.forEach(book => {
        const tagsHTML = book.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        
        const cardHTML = `
            <div class="doc-card" data-groups="${book.groups.join(' ')}">
                <div class="doc-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <h3 class="doc-title">${book.title}</h3>
                <p class="doc-author">${book.author}</p>
                <div class="doc-tags">${tagsHTML}</div>
                <button class="btn-download" onclick="window.open('${book.link}', '_blank')">Скачать .${book.type}</button>
            </div>
        `;
        grid.insertAdjacentHTML('beforeend', cardHTML);
    });
}

renderBooks(libraryDatabase);

// 4. Логика добавления методички преподавателем
document.getElementById('js-add-book')?.addEventListener('click', () => {
    const title = document.getElementById('newTitle').value.trim();
    const author = document.getElementById('newAuthor').value.trim();
    const link = document.getElementById('newLink').value.trim();
    const groupsRaw = document.getElementById('newGroups').value.trim();
    const tagsRaw = document.getElementById('newTags').value.trim();
    const type = document.getElementById('newType').value.trim() || 'PDF';

    if (!title || !author || !link) {
        alert('Пожалуйста, заполните Название, Автора и Ссылку!');
        return;
    }

    // Разбиваем запятые в массивы
    const groups = groupsRaw ? groupsRaw.split(',').map(s => s.trim().toLowerCase()) : ['all'];
    const tags = tagsRaw ? tagsRaw.split(',').map(s => s.trim()) : [];

    const newBook = { title, author, link, groups, tags, type };
    
    // Сохраняем и перерисовываем
    libraryDatabase.push(newBook);
    localStorage.setItem('nrtk_books', JSON.stringify(libraryDatabase));
    renderBooks(libraryDatabase);

    // Очищаем поля
    document.getElementById('newTitle').value = '';
    document.getElementById('newAuthor').value = '';
    document.getElementById('newLink').value = '';
    document.getElementById('newGroups').value = '';
    document.getElementById('newTags').value = '';
    document.getElementById('newType').value = '';
    
    alert('Методичка успешно добавлена!');
});

// 5. Логика фильтров по группам
const filterItems = document.querySelectorAll('.filter-list li');
filterItems.forEach(item => {
    item.addEventListener('click', () => {
        filterItems.forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        const selectedGroup = item.getAttribute('data-group');
        const cards = document.querySelectorAll('.doc-card');
        
        cards.forEach(card => {
            const cardGroups = card.getAttribute('data-groups');
            if (selectedGroup === 'all' || cardGroups.includes(selectedGroup)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    });
});

// 6. Поиск по тексту
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const cards = document.querySelectorAll('.doc-card');
    
    cards.forEach(card => {
        const title = card.querySelector('.doc-title').textContent.toLowerCase();
        const author = card.querySelector('.doc-author').textContent.toLowerCase();
        
        if (title.includes(term) || author.includes(term)) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
});
    </script>
</body>
</html>
